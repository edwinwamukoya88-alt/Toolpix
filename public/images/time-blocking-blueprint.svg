<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="40%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a103c"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blockDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="blockMeet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="blockBreak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blockAdmin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="calGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="40%" stop-color="#3b82f6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="laptopScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#122244"/>
      <stop offset="100%" stop-color="#081428"/>
    </linearGradient>
    <filter id="calShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="30" flood-color="#3b82f6" flood-opacity="0.2"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurDistract">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="heavyBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>

  <!-- Ambient light spots -->
  <circle cx="800" cy="450" r="350" fill="url(#calGlow)"/>
  <circle cx="200" cy="200" r="150" fill="#ef4444" opacity="0.03"/>
  <circle cx="1300" cy="650" r="200" fill="#3b82f6" opacity="0.04"/>

  <!-- ===== LEFT: DISTRACTIONS (blurred, fading) ===== -->
  <g filter="url(#blurDistract)" opacity="0.35">
    <!-- Slack notification -->
    <rect x="60" y="160" width="260" height="80" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2"/>
    <rect x="78" y="178" width="36" height="36" rx="10" fill="#ef4444" opacity="0.25"/>
    <rect x="126" y="185" width="120" height="8" rx="4" fill="#ef4444" opacity="0.2"/>
    <rect x="126" y="200" width="160" height="8" rx="4" fill="#ef4444" opacity="0.12"/>
    <rect x="280" y="178" width="20" height="20" rx="10" fill="#ef4444" opacity="0.15"/>

    <!-- Email notification -->
    <rect x="40" y="280" width="240" height="75" rx="14" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-opacity="0.15"/>
    <rect x="58" y="298" width="28" height="20" rx="4" fill="#f97316" opacity="0.2"/>
    <rect x="98" y="302" width="130" height="7" rx="3.5" fill="#f97316" opacity="0.18"/>
    <rect x="98" y="316" width="150" height="7" rx="3.5" fill="#f97316" opacity="0.1"/>

    <!-- Chat bubbles -->
    <rect x="80" y="395" width="220" height="65" rx="16" fill="#1e293b" stroke="#eab308" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="108" cy="428" r="16" fill="#eab308" opacity="0.15"/>
    <rect x="134" y="418" width="100" height="7" rx="3.5" fill="#eab308" opacity="0.15"/>
    <rect x="134" y="432" width="130" height="7" rx="3.5" fill="#eab308" opacity="0.08"/>

    <!-- Calendar notification -->
    <rect x="50" y="500" width="230" height="70" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="1" stroke-opacity="0.15"/>
    <rect x="68" y="518" width="28" height="28" rx="6" fill="#a855f7" opacity="0.15"/>
    <rect x="108" y="524" width="110" height="7" rx="3.5" fill="#a855f7" opacity="0.15"/>
    <rect x="108" y="538" width="80" height="7" rx="3.5" fill="#a855f7" opacity="0.08"/>
  </g>

  <!-- More blurred distractions further out -->
  <g filter="url(#heavyBlur)" opacity="0.18">
    <rect x="20" y="600" width="180" height="60" rx="12" fill="#ef4444"/>
    <rect x="100" y="100" width="200" height="50" rx="12" fill="#f97316"/>
    <circle cx="120" cy="680" r="30" fill="#eab308"/>
  </g>

  <!-- ===== DIVIDER LINE (focus vs distraction) ===== -->
  <rect x="380" y="180" width="3" height="540" rx="1.5" fill="url(#dividerGrad)" opacity="0.3"/>

  <!-- ===== CENTER: FLOATING CALENDAR ===== -->
  <g filter="url(#calShadow)" transform="translate(480, 120)">
    <!-- Calendar frame -->
    <rect x="0" y="0" width="560" height="660" rx="24" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="0" y="0" width="560" height="660" rx="24" fill="url(#glow1)" opacity="0.3"/>

    <!-- Calendar top bar -->
    <rect x="0" y="0" width="560" height="72" rx="24" fill="#0a1628"/>
    <rect x="0" y="50" width="560" height="22" fill="#0a1628"/>
    <rect x="24" y="28" width="12" height="12" rx="3" fill="#3b82f6" opacity="0.6"/>
    <rect x="44" y="26" width="100" height="16" rx="4" fill="#1e3a5f"/>
    <rect x="44" y="30" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.2"/>
    <circle cx="524" cy="36" r="14" fill="#22c55e" opacity="0.12"/>
    <circle cx="524" cy="36" r="6" fill="#22c55e" opacity="0.3"/>

    <!-- Calendar grid layout -->
    <!-- Block 1: DEEP WORK -->
    <rect x="28" y="96" width="504" height="62" rx="10" fill="#2563eb" opacity="0.12"/>
    <rect x="28" y="96" width="10" height="62" rx="5" fill="url(#blockDeep)"/>
    <rect x="52" y="110" width="120" height="12" rx="6" fill="#3b82f6" opacity="0.3"/>
    <rect x="52" y="130" width="200" height="8" rx="4" fill="#3b82f6" opacity="0.15"/>
    <rect x="52" y="144" width="140" height="8" rx="4" fill="#3b82f6" opacity="0.1"/>
    <!-- Icon circle -->
    <circle cx="490" cy="127" r="18" fill="#3b82f6" opacity="0.15"/>
    <circle cx="490" cy="127" r="10" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="490" y1="127" x2="490" y2="120" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <circle cx="490" cy="127" r="2.5" fill="#60a5fa"/>

    <!-- Block 2: MEETINGS -->
    <rect x="28" y="172" width="504" height="56" rx="10" fill="#f97316" opacity="0.12"/>
    <rect x="28" y="172" width="10" height="56" rx="5" fill="url(#blockMeet)"/>
    <rect x="52" y="186" width="100" height="12" rx="6" fill="#f97316" opacity="0.3"/>
    <rect x="52" y="204" width="180" height="8" rx="4" fill="#f97316" opacity="0.15"/>
    <rect x="52" y="218" width="120" height="8" rx="4" fill="#f97316" opacity="0.1"/>
    <circle cx="490" cy="200" r="18" fill="#f97316" opacity="0.15"/>
    <rect x="482" y="194" width="16" height="12" rx="3" fill="none" stroke="#fdba74" stroke-width="2"/>
    <polygon points="494,206 488,202 482,202" fill="#fdba74"/>

    <!-- Block 3: BREAK -->
    <rect x="28" y="242" width="504" height="44" rx="10" fill="#22c55e" opacity="0.1"/>
    <rect x="28" y="242" width="10" height="44" rx="5" fill="url(#blockBreak)"/>
    <rect x="52" y="254" width="70" height="12" rx="6" fill="#22c55e" opacity="0.25"/>
    <rect x="52" y="272" width="150" height="8" rx="4" fill="#22c55e" opacity="0.12"/>
    <circle cx="490" cy="264" r="18" fill="#22c55e" opacity="0.12"/>
    <polygon points="492,254 486,266 490,266 488,276 496,264 492,264 494,254" fill="#86efac"/>

    <!-- Block 4: DEEP WORK -->
    <rect x="28" y="300" width="504" height="62" rx="10" fill="#2563eb" opacity="0.12"/>
    <rect x="28" y="300" width="10" height="62" rx="5" fill="url(#blockDeep)"/>
    <rect x="52" y="314" width="130" height="12" rx="6" fill="#3b82f6" opacity="0.3"/>
    <rect x="52" y="334" width="190" height="8" rx="4" fill="#3b82f6" opacity="0.15"/>
    <rect x="52" y="348" width="110" height="8" rx="4" fill="#3b82f6" opacity="0.1"/>
    <circle cx="490" cy="331" r="18" fill="#3b82f6" opacity="0.15"/>
    <rect x="482" y="325" width="16" height="12" rx="2" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="486" y1="329" x2="494" y2="329" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="486" y1="333" x2="494" y2="333" stroke="#60a5fa" stroke-width="1.5"/>

    <!-- Block 5: ADMIN -->
    <rect x="28" y="376" width="504" height="50" rx="10" fill="#64748b" opacity="0.12"/>
    <rect x="28" y="376" width="10" height="50" rx="5" fill="url(#blockAdmin)"/>
    <rect x="52" y="390" width="80" height="12" rx="6" fill="#64748b" opacity="0.25"/>
    <rect x="52" y="408" width="160" height="8" rx="4" fill="#64748b" opacity="0.12"/>
    <circle cx="490" cy="401" r="18" fill="#64748b" opacity="0.12"/>
    <rect x="482" y="395" width="16" height="12" rx="2" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <polyline points="482,397 490,403 498,397" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>

    <!-- Block 6: DEEP WORK -->
    <rect x="28" y="440" width="504" height="56" rx="10" fill="#2563eb" opacity="0.1"/>
    <rect x="28" y="440" width="10" height="56" rx="5" fill="url(#blockDeep)"/>
    <rect x="52" y="454" width="140" height="12" rx="6" fill="#3b82f6" opacity="0.25"/>
    <rect x="52" y="472" width="170" height="8" rx="4" fill="#3b82f6" opacity="0.12"/>
    <circle cx="490" cy="468" r="18" fill="#3b82f6" opacity="0.15"/>
    <rect x="482" y="462" width="16" height="10" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="484" y="464" width="12" height="6" rx="1" fill="#60a5fa" opacity="0.2"/>
    <line x1="480" y1="474" x2="500" y2="474" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

    <!-- Calendar bottom bar -->
    <rect x="0" y="510" width="560" height="150" rx="24" fill="#0a1628"/>
    <rect x="0" y="510" width="560" height="15" fill="#0a1628"/>
    <!-- Mini week view -->
    <g opacity="0.3">
      <rect x="28" y="530" width="60" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="100" y="530" width="60" height="40" rx="6" fill="#3b82f6" opacity="0.2"/>
      <rect x="172" y="530" width="60" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="244" y="530" width="60" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="316" y="530" width="60" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="388" y="530" width="60" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="460" y="530" width="72" height="40" rx="6" fill="#1e3a5f"/>
    </g>
    <!-- Progress bar -->
    <rect x="28" y="590" width="504" height="6" rx="3" fill="#1e3a5f"/>
    <rect x="28" y="590" width="320" height="6" rx="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="348" cy="593" r="7" fill="#3b82f6"/>
    <circle cx="348" cy="593" r="3" fill="#0f172a"/>
  </g>

  <!-- Floating glow particles around calendar -->
  <g opacity="0.25">
    <circle cx="480" cy="100" r="4" fill="#3b82f6"/>
    <circle cx="1060" cy="180" r="3" fill="#8b5cf6"/>
    <circle cx="500" cy="780" r="5" fill="#3b82f6" opacity="0.15"/>
    <circle cx="1040" cy="760" r="3" fill="#8b5cf6" opacity="0.15"/>
    <circle cx="520" cy="140" r="2" fill="#60a5fa"/>
    <circle cx="1020" cy="200" r="2" fill="#a78bfa"/>
  </g>

  <!-- ===== RIGHT: DESK / PERSON (subtle, minimal) ===== -->
  <g transform="translate(1150, 400)">
    <!-- Desk surface -->
    <rect x="-140" y="100" width="280" height="8" rx="4" fill="#1e293b"/>
    <rect x="-140" y="100" width="280" height="8" rx="4" fill="#3b82f6" opacity="0.05"/>

    <!-- Laptop -->
    <rect x="-80" y="50" width="160" height="14" rx="4" fill="#1e293b"/>
    <rect x="-80" y="64" width="160" height="4" rx="2" fill="#0f172a"/>
    <rect x="-90" y="-50" width="180" height="100" rx="10" fill="url(#laptopScreen)" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Screen glow -->
    <rect x="-90" y="-50" width="180" height="100" rx="10" fill="#3b82f6" opacity="0.04"/>
    <!-- Mini calendar on screen -->
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#0a1628" opacity="0.6"/>
    <rect x="-70" y="-35" width="140" height="16" rx="6" fill="#0f2744"/>
    <rect x="-62" y="-30" width="30" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
    <rect x="-62" y="-14" width="120" height="6" rx="3" fill="#3b82f6" opacity="0.25"/>
    <rect x="-62" y="-4" width="100" height="6" rx="3" fill="#f97316" opacity="0.2"/>
    <rect x="-62" y="6" width="80" height="6" rx="3" fill="#22c55e" opacity="0.15"/>
    <rect x="-62" y="16" width="120" height="6" rx="3" fill="#3b82f6" opacity="0.2"/>

    <!-- Person silhouette (subtle) -->
    <ellipse cx="0" cy="-90" rx="28" ry="32" fill="#1e293b"/>
    <ellipse cx="0" cy="-90" rx="28" ry="32" fill="#475569" opacity="0.08"/>
    <!-- Body -->
    <path d="M-30,-55 Q-35,0 -25,50 L25,50 Q35,0 30,-55 Z" fill="#1e293b"/>
    <!-- Shoulders -->
    <path d="M-45,-40 Q-35,-55 -25,-55 L25,-55 Q35,-55 45,-40 Z" fill="#1e293b"/>
    <!-- Arms -->
    <path d="M-28,-40 Q-60,-15 -55,15 Q-52,22 -46,19 Q-50,-8 -24,-28 Z" fill="#1e293b"/>
    <path d="M28,-40 Q60,-15 55,15 Q52,22 46,19 Q50,-8 24,-28 Z" fill="#1e293b"/>
    <!-- Face glow -->
    <ellipse cx="0" cy="-90" rx="28" ry="32" fill="#3b82f6" opacity="0.03"/>
  </g>

  <!-- ===== RIGHT: FOCUS STATS (abstract, no readable text) ===== -->
  <g transform="translate(1140, 180)">
    <rect x="0" y="0" width="180" height="80" rx="16" fill="#0f172a" stroke="#1e3a5f" stroke-width="1" opacity="0.8"/>
    <rect x="16" y="16" width="60" height="12" rx="6" fill="#1e3a5f"/>
    <rect x="16" y="36" width="80" height="28" rx="6" fill="#3b82f6" opacity="0.15"/>
    <rect x="16" y="42" width="50" height="16" rx="4" fill="#3b82f6" opacity="0.3"/>
    <rect x="130" y="16" width="36" height="18" rx="9" fill="#22c55e" opacity="0.15"/>
    <rect x="138" y="22" width="20" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
    <rect x="16" y="68" width="80" height="8" rx="4" fill="#64748b" opacity="0.15"/>
  </g>

  <!-- ===== CALENDAR FLOATING GLOW DOTS ===== -->
  <g opacity="0.15">
    <circle cx="1040" cy="560" r="8" fill="#3b82f6"/>
    <circle cx="1070" cy="580" r="4" fill="#8b5cf6"/>
    <circle cx="450" cy="780" r="6" fill="#3b82f6"/>
  </g>
</svg>
